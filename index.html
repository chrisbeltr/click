<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>buhh</title>
  </head>
  <body>
    <h1>borks.click</h1>
    <form id="form" action="">
      <label for="link">link</label><br />
      <input type="text" name="link" id="link" placeholder="link starting with http(s)"/><br />
      <input type="submit" value="submit" />
    </form>
    <span id="response"></span>
    <script>
      let form = document.getElementById("form");
      let response = document.getElementById("response");
      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();

        let data = new FormData(form);
        let url = encodeURIComponent(data.get("link"));
        form.reset();

        let res = await fetch(`./${url}`, { method: "POST" });
        let link = await res.text();
        if (link == "something went wrong") {
          response.innerHTML = "something went wrong";
          return;
        }
        response.innerHTML = `your new link: <a href="${link}" target="_blank">${link}</a>`;
      });
    </script>
  </body>
</html>
