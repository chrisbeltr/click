services:
  click:
    build:
      context: .
      dockerfile: Dockerfile.node
    pull_policy: build
    stop_grace_period: 1s
    image: click-node:latest
    container_name: click
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - backend
    command: ["node", "main.js"]

  qr:
    image: click-node:latest
    pull_policy: build
    stop_grace_period: 1s
    container_name: qr
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    networks:
      - backend
    command: ["node", "qr.js"]

  cdn:
    image: click-node:latest
    pull_policy: build
    stop_grace_period: 1s
    container_name: cdn
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    networks:
      - backend
    command: ["node", "cdn.js"]

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    pull_policy: build
    container_name: caddy-click
    restart: unless-stopped
    depends_on:
      - click
      - qr
      - cdn
    env_file: .env
    networks:
      - backend
      - gateway-network
    volumes:
      - caddy_data:/data

networks:
  backend:
    driver: bridge
  gateway-network:
    external: true

volumes:
  caddy_data:
